# gitleaks configuration
#
# Inherit gitleaks' built-in default rules and add a small allowlist for known
# false positives that are NOT secrets.
[extend]
useDefault = true

# Public PGP fingerprint of the upstream helm-unittest signing key, pinned in
# CI so a swap of the committed public-key file fails the build. A 40-char
# hex public fingerprint is, by definition, public; gitleaks' generic-api-key
# rule classifies any 40-hex run as high entropy, so allowlist this exact
# value (in any file in the repo).
[[allowlists]]
description = "helm-unittest signing key fingerprint (public, not a secret)"
regexes = [
  '''853008CD0B0A5A2DA04FF8A5616AD47F65B54AC7''',
]
