run:
  timeout: 5m
  go: "1.26"

linters:
  enable:
    # Code quality
    - errcheck      # Unchecked error returns
    - staticcheck   # Advanced static analysis
    - unused        # Unused variables/imports
    - gosimple      # Code simplifications
    - ineffassign   # Ineffective assignments
    - misspell      # Spelling mistakes in comments/strings

    # Best practices
    - contextcheck  # Context usage validation
    - noctx         # Avoid passing TODO context
    - errorlint     # Error wrapping issues

    # Security
    - gosec         # Security anti-patterns

    # Style
    - revive        # Go style guide enforcement
    - bodyclose     # HTTP response body closure
    - unparam       # Unused function parameters
    - nolintlint    # Enforce // nolint comment justification

    # Logging
    - loggercheck   # Validate slog/log.Logger usage patterns

  disable-all: false
  fast: false

linters-settings:
  errcheck:
    # Report about not checking of errors in type assertions
    check-type-assertions: false
    # Report about assignment of errors to blank identifier
    check-blank: false

  gosec:
    # Exclude g204 (os/exec command injection) since we don't use exec
    # Exclude g306 (file mode) as it's overly strict for this project
    excludes:
      - G204  # exec subprocess with dynamic args
      - G306  # file mode is not specified
    severity: medium

  revive:
    # Ignore package naming conventions for generated code
    rules:
      - name: package-comments
        disabled: false
      - name: receiver-naming
        disabled: false
      - name: var-naming
        disabled: false

issues:
  # Show all issues
  max-issues-per-linter: 0
  max-same-issues: 0
  # Don't report issues from test files unless they're critical
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec  # Security checks in tests are less critical
