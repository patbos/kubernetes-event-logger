{{- if .Values.networkPolicy.enabled }}
{{- if and .Values.networkPolicy.egress.kubernetesAPI.enabled (empty .Values.networkPolicy.egress.kubernetesAPI.ipBlocks) }}
{{- fail "networkPolicy.egress.kubernetesAPI.ipBlocks must contain at least one cidr when Kubernetes API egress is enabled" }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubernetes-event-logger.fullname" . }}
  labels:
    {{- include "kubernetes-event-logger.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubernetes-event-logger.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress

  # Ingress: Allow traffic from Prometheus for metrics scraping
  ingress:
  {{- if .Values.networkPolicy.ingress.prometheus.enabled }}
  - from:
    - namespaceSelector:
        matchLabels:
          {{- toYaml .Values.networkPolicy.ingress.prometheus.namespaceSelector.matchLabels | nindent 12 }}
    ports:
    - protocol: TCP
      port: {{ .Values.metricsPort.containerPort }}
  {{- end }}

  # Egress: Allow Kubernetes API access and optional DNS queries
  egress:
  {{- if .Values.networkPolicy.egress.dns.enabled }}
  # Allow DNS to the configured DNS pods
  - to:
    - namespaceSelector:
        {{- toYaml .Values.networkPolicy.egress.dns.namespaceSelector | nindent 8 }}
      podSelector:
        {{- toYaml .Values.networkPolicy.egress.dns.podSelector | nindent 8 }}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  {{- end }}

  {{- if .Values.networkPolicy.egress.kubernetesAPI.enabled }}
  # Allow HTTPS to the configured Kubernetes API IP/CIDR blocks
  {{- range .Values.networkPolicy.egress.kubernetesAPI.ipBlocks }}
  - to:
    - ipBlock:
        cidr: {{ .cidr | quote }}
        {{- with .except }}
        except:
          {{- toYaml . | nindent 10 }}
        {{- end }}
    ports:
    - protocol: TCP
      port: {{ $.Values.networkPolicy.egress.kubernetesAPI.port }}
  {{- end }}
  {{- end }}

  {{- with .Values.networkPolicy.extraEgress }}
  # Additional user-provided egress rules
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
