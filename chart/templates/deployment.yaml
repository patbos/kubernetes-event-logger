apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubernetes-event-logger.fullname" . }}
  labels:
    {{- include "kubernetes-event-logger.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "kubernetes-event-logger.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kubernetes-event-logger.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kubernetes-event-logger.serviceAccountName" . }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ include "kubernetes-event-logger.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: {{ .Values.healthPort.name }}
              containerPort: {{ .Values.healthPort.containerPort }}
              protocol: TCP
            - name: {{ .Values.metricsPort.name }}
              containerPort: {{ .Values.metricsPort.containerPort }}
              protocol: TCP
          args:
            - -lease-name={{ include "kubernetes-event-logger.leaseName" . }}
            - -lease-duration={{ .Values.leaderElection.leaseDuration }}
            - -renew-deadline={{ .Values.leaderElection.renewDeadline }}
            - -retry-period={{ .Values.leaderElection.retryPeriod }}
            - -health-addr=:{{ .Values.healthPort.containerPort }}
            - -metrics-addr=:{{ .Values.metricsPort.containerPort }}
            - -log-format={{ .Values.logFormat }}
            {{- range .Values.excludeFilters }}
            - -exclude-filter={{ include "kubernetes-event-logger.excludeFilter" . }}
            {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          startupProbe:
            {{- include "kubernetes-event-logger.httpProbe" (dict "config" .Values.startupProbe "port" .Values.healthPort.containerPort "path" "/healthz") | nindent 12 }}
          livenessProbe:
            {{- include "kubernetes-event-logger.httpProbe" (dict "config" .Values.livenessProbe "port" .Values.healthPort.containerPort "path" "/healthz") | nindent 12 }}
          readinessProbe:
            {{- include "kubernetes-event-logger.httpProbe" (dict "config" .Values.readinessProbe "port" .Values.healthPort.containerPort "path" "/readyz") | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "kubernetes-event-logger.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range . }}
        - maxSkew: {{ .maxSkew }}
          topologyKey: {{ .topologyKey }}
          whenUnsatisfiable: {{ .whenUnsatisfiable }}
          {{- if .labelSelector }}
          labelSelector:
            {{- if .labelSelector.matchLabels }}
            matchLabels:
              {{- toYaml .labelSelector.matchLabels | nindent 14 }}
            {{- else }}
            matchLabels:
              {{- include "kubernetes-event-logger.selectorLabels" $ | nindent 14 }}
            {{- end }}
          {{- else }}
          labelSelector:
            matchLabels:
              {{- include "kubernetes-event-logger.selectorLabels" $ | nindent 14 }}
          {{- end }}
        {{- end }}
      {{- end }}
