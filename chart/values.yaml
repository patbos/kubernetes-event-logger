# Number of replicas. With replicaCount > 1, leader election is active.
# Only the leader logs events; standby replicas wait for failover.
replicaCount: 2

image:
  repository: ghcr.io/patbos/kubernetes-event-logger
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  # Overrides the name; defaults to the fullname of the release.
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Resource requests and limits. The app has minimal footprint in standby mode.
# Requests help the scheduler place pods; limits prevent resource exhaustion.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 512Mi

port:
  containerPort: 8080
  name: metrics

livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 2

nodeSelector: {}

tolerations: []

affinity: {}

priorityClassName: ""

# Grace period for graceful shutdown. App handles SIGTERM/SIGINT.
terminationGracePeriodSeconds: 30

# Deployment strategy. RollingUpdate with maxUnavailable=0 ensures zero-downtime updates.
# maxSurge=1 allows one extra pod during update to maintain capacity.
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Leader election configuration for high-availability deployments.
# Only the leader processes events; others are in standby.
leaderElection:
  leaseDuration: 15s      # Duration leader lease is valid
  renewDeadline: 10s      # Time leader has to renew lease before losing it
  retryPeriod: 2s         # Retry interval for acquiring/renewing lease

# List of event exclusion rules.
# Each rule excludes events only when all configured fields match.
# Supported fields: namespace, kind, name, reason, type, reportingComponent, sourceComponent
# Example:
#   - kind: Node
#     type: Normal
#   - namespace: kube-system
#     reason: Scheduled
excludeFilters: []

# Pod Disruption Budget prevents voluntary disruptions from affecting availability.
# Ensures at least minAvailable replicas remain during cluster maintenance.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  relabelings: []
