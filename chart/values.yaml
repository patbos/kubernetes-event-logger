# Number of replicas. With replicaCount > 1, leader election is active.
# Only the leader logs events; standby replicas wait for failover.
replicaCount: 2

image:
  repository: ghcr.io/patbos/kubernetes-event-logger
  # With digest set (in releases), pull policy doesn't matter; image is immutable.
  # Without digest, IfNotPresent uses cached images (fine for released digests).
  # Only override to Always if pinning to mutable tags.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""
  # Optional immutable image digest, for example:
  # sha256:0123456789abcdef...
  # When set, the chart renders repository[:tag]@digest and Kubernetes pulls by digest.
  digest: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  # Overrides the name; defaults to the fullname of the release when create=true.
  # Required when create=false so RBAC is not bound to the namespace default ServiceAccount.
  name: ""

podAnnotations: {}

# Additional pod labels.
# Pod Security Admission is enforced with namespace labels, not pod labels.
# This chart is configured to be compatible with the restricted profile via
# pod/container security contexts, but namespace enforcement must be enabled
# separately by the cluster operator.
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  # File system group for mounted volumes
  # Ensures non-root user can write to volumes (if added in future)
  # No impact if no volumes are mounted
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Resource requests and limits. The app has minimal footprint in standby mode.
# Requests help the scheduler place pods; limits prevent resource exhaustion.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 512Mi

port:
  containerPort: 8080
  name: metrics

startupProbe:
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 2

nodeSelector: {}

tolerations: []

# Pod anti-affinity: spread replicas across nodes for better availability.
# Default (null) activates built-in anti-affinity using the chart's selector labels.
# Set a non-empty affinity block to override the default anti-affinity.
affinity: null

# Topology spread constraints for fine-grained pod distribution (Kubernetes 1.19+).
# Use this to spread replicas across zones or other topology domains.
# The chart injects selector labels automatically when labelSelector.matchLabels is empty.
# Example:
#   topologySpreadConstraints:
#     - maxSkew: 1
#       topologyKey: topology.kubernetes.io/zone
#       whenUnsatisfiable: DoNotSchedule
#       labelSelector:
#         matchLabels: {}
topologySpreadConstraints: []

priorityClassName: ""

# Grace period for graceful shutdown. App handles SIGTERM/SIGINT.
terminationGracePeriodSeconds: 30

# Deployment strategy. RollingUpdate with one-pod-at-a-time updates.
# With leader election (1 active + 1 standby), no surge pods needed.
# maxUnavailable=1 replaces one pod at a time; standby takes over if active pod is replaced.
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1

# Leader election configuration for high-availability deployments.
# Only the leader processes events; others are in standby.
leaderElection:
  leaseDuration: 15s      # Duration leader lease is valid
  renewDeadline: 10s      # Time leader has to renew lease before losing it
  retryPeriod: 2s         # Retry interval for acquiring/renewing lease

# Event JSON log format. Supported values: flat, legacy, message.
logFormat: flat

# Enable high-cardinality metrics (events by namespace, reason, and object kind).
# Recommendation: Keep disabled in large clusters to avoid Prometheus performance issues.
enableDetailedMetrics: false

# List of event exclusion rules.
# Each rule excludes events only when all configured fields match.
# Supported keys: namespace, kind, name, reason, type, reportingComponent, reportingController, sourceComponent
# reportingController is an alias for reportingComponent (matches the Go CLI alias).
# Values support shell-style wildcards using Go path.Match syntax (* ? [abc]).
# Patterns are validated at startup; malformed patterns make the pod fail.
# Example:
#   - kind: Node
#     type: Normal
#   - namespace: kube-system
#     reason: Scheduled
#   - namespace: kube-*       # wildcard match
#   - reason: BackOff*        # wildcard match
excludeFilters: []

# Pod Disruption Budget prevents voluntary disruptions from affecting availability.
# Ensures at least minAvailable replicas remain during cluster maintenance.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  relabelings: []

# Network Policy: restrict traffic to/from the pod
# Prevents lateral movement if pod is compromised
# Requires cluster with network policy support (Calico, Cilium, etc)
# RECOMMENDATION: Enable in production clusters with network policy support for defense-in-depth
networkPolicy:
  enabled: false
  # Ingress: allow traffic from Prometheus for metrics scraping
  ingress:
    prometheus:
      enabled: true
      # Namespace selector for Prometheus (adjust to your setup)
      namespaceSelector:
        matchLabels:
          name: prometheus
  # Egress: allow DNS and Kubernetes API access
  egress:
    # Allow DNS queries (port 53 UDP)
    dns:
      enabled: true
    # Allow Kubernetes API access (port 443 TCP to kube-system)
    kubernetesAPI:
      enabled: true
