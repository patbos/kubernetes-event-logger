suite: RBAC
tests:
  - it: should grant get list watch on events
    template: clusterrole.yaml
    asserts:
      - isKind:
          of: ClusterRole
      - equal:
          path: rules[0].resources[0]
          value: events
      - equal:
          path: rules[0].apiGroups[0]
          value: ""
      - contains:
          path: rules[0].verbs
          content: get
      - contains:
          path: rules[0].verbs
          content: list
      - contains:
          path: rules[0].verbs
          content: watch

  - it: should bind ClusterRole to ServiceAccount
    template: clusterrolebinding.yaml
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - equal:
          path: roleRef.kind
          value: ClusterRole

  - it: should create ServiceAccount by default
    template: serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - hasDocuments:
          count: 1

  - it: should not create ServiceAccount when disabled
    template: serviceaccount.yaml
    set:
      serviceAccount.create: false
      serviceAccount.name: my-sa
    asserts:
      - hasDocuments:
          count: 0

  - it: should grant get update on leases for leader election
    template: role.yaml
    asserts:
      - isKind:
          of: Role
      - equal:
          path: rules[0].resources[0]
          value: leases
      - equal:
          path: rules[0].apiGroups[0]
          value: coordination.k8s.io
      - contains:
          path: rules[0].verbs
          content: get
      - contains:
          path: rules[0].verbs
          content: update

  - it: should scope lease Role to release-specific lease name
    template: role.yaml
    asserts:
      - equal:
          path: rules[0].resourceNames[0]
          value: RELEASE-NAME-kubernetes-event-logger

  - it: should scope lease Role to fullnameOverride lease name
    template: role.yaml
    set:
      fullnameOverride: my-custom-name
    asserts:
      - equal:
          path: rules[0].resourceNames[0]
          value: my-custom-name

  - it: should bind leaderelection Role to ServiceAccount
    template: rolebinding.yaml
    asserts:
      - isKind:
          of: RoleBinding
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - equal:
          path: roleRef.kind
          value: Role

  - it: should grant create on leases for first-start Lease initialisation
    template: role.yaml
    asserts:
      - equal:
          path: rules[1].apiGroups[0]
          value: coordination.k8s.io
      - equal:
          path: rules[1].resources[0]
          value: leases
      - contains:
          path: rules[1].verbs
          content: create
      # RBAC does not allow resourceNames on the create verb; this rule
      # must therefore not be scoped by name.
      - notExists:
          path: rules[1].resourceNames

  - it: should expose exactly two leader-election rules
    template: role.yaml
    asserts:
      - lengthEqual:
          path: rules
          count: 2
