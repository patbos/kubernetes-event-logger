suite: lease
templates:
  - lease.yaml
tests:
  - it: should render one Lease
    asserts:
      - isKind:
          of: Lease
      - hasDocuments:
          count: 1

  - it: should use fullname as lease name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kubernetes-event-logger

  - it: should use fullnameOverride as lease name
    set:
      fullnameOverride: my-custom-name
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-name
