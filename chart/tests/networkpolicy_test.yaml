suite: network policy
templates:
  - networkpolicy.yaml
tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render NetworkPolicy when enabled
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.kubernetesAPI.ipBlocks:
        - cidr: 10.96.0.1/32
    asserts:
      - isKind:
          of: NetworkPolicy
      - hasDocuments:
          count: 1

  - it: should include both Ingress and Egress policy types
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.kubernetesAPI.ipBlocks:
        - cidr: 10.96.0.1/32
    asserts:
      - contains:
          path: spec.policyTypes
          content: Ingress
      - contains:
          path: spec.policyTypes
          content: Egress

  - it: should allow prometheus ingress on metrics port
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.kubernetesAPI.ipBlocks:
        - cidr: 10.96.0.1/32
      networkPolicy.ingress.prometheus.enabled: true
    asserts:
      - isNotNull:
          path: spec.ingress
      - equal:
          path: spec.ingress[0].ports[0].port
          value: 9090

  - it: should allow DNS egress when enabled
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.dns.enabled: true
      networkPolicy.egress.kubernetesAPI.ipBlocks:
        - cidr: 10.96.0.1/32
    asserts:
      - isNotNull:
          path: spec.egress
      - equal:
          path: spec.egress[0].to[0].namespaceSelector.matchLabels
          value:
            kubernetes.io/metadata.name: kube-system
      - equal:
          path: spec.egress[0].to[0].podSelector.matchLabels.k8s-app
          value: kube-dns
      - equal:
          path: spec.egress[0].ports[0].protocol
          value: UDP
      - equal:
          path: spec.egress[0].ports[0].port
          value: 53
      - equal:
          path: spec.egress[0].ports[1].protocol
          value: TCP
      - equal:
          path: spec.egress[0].ports[1].port
          value: 53

  - it: should not allow DNS egress by default
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.kubernetesAPI.ipBlocks:
        - cidr: 10.96.0.1/32
    asserts:
      - equal:
          path: spec.egress[0].to[0].ipBlock.cidr
          value: 10.96.0.1/32
      - equal:
          path: spec.egress[0].ports[0].protocol
          value: TCP
      - equal:
          path: spec.egress[0].ports[0].port
          value: 443
      - isNull:
          path: spec.egress[1]

  - it: should allow Kubernetes API egress when enabled
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.kubernetesAPI.enabled: true
      networkPolicy.egress.kubernetesAPI.ipBlocks:
        - cidr: 10.96.0.1/32
    asserts:
      - isNotNull:
          path: spec.egress
      - equal:
          path: spec.egress[0].to[0].ipBlock.cidr
          value: 10.96.0.1/32
      - equal:
          path: spec.egress[0].ports[0].port
          value: 443

  - it: should require Kubernetes API ipBlocks when egress is enabled
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.kubernetesAPI.enabled: true
      networkPolicy.egress.kubernetesAPI.ipBlocks: []
    asserts:
      - failedTemplate:
          errorMessage: networkPolicy.egress.kubernetesAPI.ipBlocks must contain at least one cidr when Kubernetes API egress is enabled

  - it: should append extra egress rules
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.kubernetesAPI.ipBlocks:
        - cidr: 10.96.0.1/32
      networkPolicy.extraEgress:
        - to:
            - ipBlock:
                cidr: 192.0.2.10/32
          ports:
            - protocol: TCP
              port: 8443
    asserts:
      - equal:
          path: spec.egress[1].to[0].ipBlock.cidr
          value: 192.0.2.10/32
      - equal:
          path: spec.egress[1].ports[0].port
          value: 8443
