suite: service
templates:
  - service.yaml
tests:
  - it: should render one Service
    asserts:
      - isKind:
          of: Service
      - hasDocuments:
          count: 1

  - it: should be ClusterIP type
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose metrics port 8080
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8080
      - equal:
          path: spec.ports[0].name
          value: metrics

  - it: should use configured port
    set:
      port.containerPort: 9090
      port.name: custom
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 9090
      - equal:
          path: spec.ports[0].name
          value: custom
