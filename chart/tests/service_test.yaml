suite: service
templates:
  - service.yaml
tests:
  - it: should render one Service
    asserts:
      - isKind:
          of: Service
      - hasDocuments:
          count: 1

  - it: should be ClusterIP type
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose metrics port 9090
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 9090
      - equal:
          path: spec.ports[0].name
          value: metrics

  - it: should use configured metrics port
    set:
      metricsPort.containerPort: 9091
      metricsPort.name: custom
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 9091
      - equal:
          path: spec.ports[0].name
          value: custom
