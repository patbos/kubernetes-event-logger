name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          # Extract version: v0.3.0 -> 0.3.0
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Update Chart.yaml
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "Updating chart/Chart.yaml to version $VERSION"

          # Update version and appVersion
          sed -i "s/^version:.*/version: $VERSION/" chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" chart/Chart.yaml

          # Verify changes
          echo "Verifying updates:"
          grep -E "^version:|^appVersion:" chart/Chart.yaml

      - name: Commit Chart.yaml changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chart/Chart.yaml
          git commit -m "Bump chart version to ${{ steps.version.outputs.TAG }}" || echo "No changes to commit"
          git push origin main || echo "Already up to date"

      - name: Normalize image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}},value=${{ steps.version.outputs.VERSION }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.VERSION }}
            type=sha

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.TAG }}
          sbom: true
          provenance: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0

      - name: Set chart image digest
        run: |
          DIGEST=${{ steps.build.outputs.digest }}
          echo "Updating chart/values.yaml to use image digest ${DIGEST}"
          sed -i "s|^  digest:.*|  digest: \"${DIGEST}\"|" chart/values.yaml
          grep -E "^  digest:" chart/values.yaml

      - name: Package Helm chart
        run: |
          helm package chart \
            --version "${{ steps.version.outputs.VERSION }}" \
            --app-version "${{ steps.version.outputs.TAG }}"

      - name: Push Helm chart to GHCR
        id: chart_push
        run: |
          REPO="${GITHUB_REPOSITORY,,}"
          CHART_OCI_REPO="oci://${{ env.REGISTRY }}/${REPO%/*}"
          CHART_TGZ="kubernetes-event-logger-${{ steps.version.outputs.VERSION }}.tgz"
          PUSH_LOG="$(mktemp)"

          helm push "$CHART_TGZ" "$CHART_OCI_REPO" 2>&1 | tee "$PUSH_LOG"

          CHART_PUSHED_REF=$(awk '/^Pushed:/ {print $2}' "$PUSH_LOG")
          CHART_DIGEST=$(awk '/^Digest:/ {print $2}' "$PUSH_LOG")

          if [ -z "$CHART_PUSHED_REF" ] || [ -z "$CHART_DIGEST" ]; then
            echo "Failed to parse chart push output for digest." >&2
            exit 1
          fi

          CHART_BARE_REF="${CHART_PUSHED_REF%:*}"
          CHART_OCI_DIGEST_REF="${CHART_BARE_REF}@${CHART_DIGEST}"

          echo "ref=${CHART_OCI_DIGEST_REF}" >> "$GITHUB_OUTPUT"
          echo "digest=${CHART_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Sign Helm chart
        env:
          CHART_REF: ${{ steps.chart_push.outputs.ref }}
        run: cosign sign --yes "$CHART_REF"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.TAG }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
