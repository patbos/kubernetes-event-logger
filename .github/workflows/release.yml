name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  # contents: write -- required by softprops/action-gh-release to create the
  #                    GitHub Release object. No other step in this workflow
  #                    writes to repo contents.
  # packages: write -- required to push the image and chart to GHCR.
  # id-token: write -- required for cosign keyless signing via Sigstore.
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate release source
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          scripts/validate-release-source.sh "$GITHUB_REF_NAME" origin/main

      - name: Extract version from tag
        id: version
        run: |
          # Extract version: v0.3.0 -> 0.3.0
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      # Note: chart/Chart.yaml is treated as a template; its version/appVersion
      # fields are intentionally not kept in sync with releases. The packaged
      # chart's metadata is set authoritatively below via
      # `helm package --version --app-version`.

      - name: Normalize image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}},value=${{ steps.version.outputs.VERSION }}
            type=sha

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.TAG }}
          sbom: true
          provenance: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1

      - name: Set chart image digest
        run: |
          DIGEST=${{ steps.build.outputs.digest }}
          echo "Updating chart/values.yaml to use image digest ${DIGEST}"
          sed -i "s|^  digest:.*|  digest: \"${DIGEST}\"|" chart/values.yaml
          grep -E "^  digest:" chart/values.yaml

      - name: Package Helm chart
        run: |
          helm package chart \
            --version "${{ steps.version.outputs.VERSION }}" \
            --app-version "${{ steps.version.outputs.TAG }}"

      - name: Push Helm chart to GHCR
        id: chart_push
        run: |
          REPO="${GITHUB_REPOSITORY,,}"
          CHART_OCI_REPO="oci://${{ env.REGISTRY }}/${REPO%/*}"
          CHART_TGZ="kubernetes-event-logger-${{ steps.version.outputs.VERSION }}.tgz"
          PUSH_LOG="$(mktemp)"

          helm push "$CHART_TGZ" "$CHART_OCI_REPO" 2>&1 | tee "$PUSH_LOG"

          CHART_PUSHED_REF=$(awk '/^Pushed:/ {print $2}' "$PUSH_LOG")
          CHART_DIGEST=$(awk '/^Digest:/ {print $2}' "$PUSH_LOG")

          if [ -z "$CHART_PUSHED_REF" ] || [ -z "$CHART_DIGEST" ]; then
            echo "Failed to parse chart push output for digest." >&2
            exit 1
          fi

          CHART_BARE_REF="${CHART_PUSHED_REF%:*}"
          CHART_OCI_DIGEST_REF="${CHART_BARE_REF}@${CHART_DIGEST}"

          echo "ref=${CHART_OCI_DIGEST_REF}" >> "$GITHUB_OUTPUT"
          echo "digest=${CHART_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Sign Helm chart
        env:
          CHART_REF: ${{ steps.chart_push.outputs.ref }}
        run: cosign sign --yes "$CHART_REF"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.TAG }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
