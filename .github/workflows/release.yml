name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      tag: ${{ steps.version.outputs.TAG }}
      image-name: ${{ steps.image.outputs.name }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          # Extract version: v0.3.0 -> 0.3.0
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Update Chart.yaml
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "Updating chart/Chart.yaml to version $VERSION"

          # Update version and appVersion
          sed -i "s/^version:.*/version: $VERSION/" chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" chart/Chart.yaml

          # Verify changes
          echo "Verifying updates:"
          grep -E "^version:|^appVersion:" chart/Chart.yaml

      - name: Commit Chart.yaml changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chart/Chart.yaml
          git commit -m "Bump chart version to ${{ steps.version.outputs.TAG }}" || echo "No changes to commit"
          git push origin main || echo "Already up to date"

      - name: Normalize image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

  build-amd64:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image-name }}:${{ needs.prepare.outputs.tag }}-amd64
          build-args: VERSION=${{ needs.prepare.outputs.tag }}

  build-arm64:
    needs: prepare
    runs-on: ubuntu-latest-arm64

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image-name }}:${{ needs.prepare.outputs.tag }}-arm64
          build-args: VERSION=${{ needs.prepare.outputs.tag }}

  create-manifest:
    needs: [prepare, build-amd64, build-arm64]
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image-name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.version }}
            type=sha

      - name: Create and push manifest
        run: |
          # Create manifest with both architectures
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image-name }}:latest \
            -t ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image-name }}:${{ needs.prepare.outputs.tag }} \
            -t ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image-name }}:${{ needs.prepare.outputs.version }} \
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image-name }}:${{ needs.prepare.outputs.tag }}-amd64 \
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image-name }}:${{ needs.prepare.outputs.tag }}-arm64

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          helm package chart \
            --version "${{ steps.version.outputs.VERSION }}" \
            --app-version "${{ steps.version.outputs.TAG }}"

      - name: Push Helm chart to GHCR
        run: |
          REPO="${GITHUB_REPOSITORY,,}"
          helm push kubernetes-event-logger-${{ steps.version.outputs.VERSION }}.tgz \
            oci://${{ env.REGISTRY }}/${REPO%/*}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.TAG }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
