name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  checks: read
  contents: write
  packages: write
  id-token: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          # Extract version: v0.3.0 -> 0.3.0
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Verify tag commit is on main
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tag ${GITHUB_REF_NAME} points to ${GITHUB_SHA}, which is not reachable from origin/main."
            exit 1
          fi

      - name: Verify CI passed for release commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          successful_verify_runs=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs" \
            --jq '.check_runs | map(select(.name == "verify" and .conclusion == "success")) | length')

          if [ "$successful_verify_runs" -eq 0 ]; then
            echo "No successful CI verify check was found for ${GITHUB_SHA}."
            exit 1
          fi

      - name: Update Chart.yaml
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "Updating chart/Chart.yaml to version $VERSION"

          # Update version and appVersion
          sed -i "s/^version:.*/version: $VERSION/" chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" chart/Chart.yaml

          # Verify changes
          echo "Verifying updates:"
          grep -E "^version:|^appVersion:" chart/Chart.yaml

      - name: Commit Chart.yaml changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chart/Chart.yaml
          git commit -m "Bump chart version to ${{ steps.version.outputs.TAG }}" || echo "No changes to commit"
          git push origin main || echo "Already up to date"

      - name: Normalize image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}},value=${{ steps.version.outputs.VERSION }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.VERSION }}
            type=sha

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.TAG }}
          sbom: true
          provenance: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0

      - name: Set chart image digest
        run: |
          DIGEST=${{ steps.build.outputs.digest }}
          echo "Updating chart/values.yaml to use image digest ${DIGEST}"
          sed -i "s|^  digest:.*|  digest: \"${DIGEST}\"|" chart/values.yaml
          grep -E "^  digest:" chart/values.yaml

      - name: Package Helm chart
        run: |
          helm package chart \
            --version "${{ steps.version.outputs.VERSION }}" \
            --app-version "${{ steps.version.outputs.TAG }}"

      - name: Push Helm chart to GHCR
        run: |
          REPO="${GITHUB_REPOSITORY,,}"
          helm push kubernetes-event-logger-${{ steps.version.outputs.VERSION }}.tgz \
            oci://${{ env.REGISTRY }}/${REPO%/*}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.TAG }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
