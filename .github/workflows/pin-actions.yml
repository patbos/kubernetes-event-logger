name: Pin GitHub Actions to SHAs

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  pin-actions:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pin actions to commit SHAs
        run: |
          python3 << 'EOF'
          import re
          import subprocess
          import json
          import os

          github_token = os.environ.get('GITHUB_TOKEN')
          workflows_dir = '.github/workflows'

          def get_action_sha(owner_repo, version_tag):
              """Get commit SHA for a GitHub action version tag"""
              try:
                cmd = [
                  'gh', 'api',
                  f'repos/{owner_repo}/commits/{version_tag}',
                  '--jq', '.sha'
                ]
                result = subprocess.run(
                  cmd,
                  capture_output=True,
                  text=True,
                  timeout=10,
                  env={**os.environ, 'GITHUB_TOKEN': github_token}
                )
                sha = result.stdout.strip()
                if sha and len(sha) == 40:
                  return sha
              except Exception as e:
                print(f'  ⚠️  Could not get SHA for {owner_repo}@{version_tag}: {e}')
              return None

          # Find all workflow files
          import glob
          workflows = glob.glob(f'{workflows_dir}/**/*.yml', recursive=True) + \
                     glob.glob(f'{workflows_dir}/**/*.yaml', recursive=True)

          total_updated = 0

          for workflow_file in workflows:
            with open(workflow_file, 'r') as f:
              content = f.read()

            original_content = content

            # Pattern: uses: owner/repo@vX.Y.Z (with or without comments)
            pattern = r'uses:\s+([a-zA-Z0-9\-_.]+/[a-zA-Z0-9\-_.]+)@v(\d+\.\d+\.\d+)(?:\s+#.*)?'

            def replace_with_sha(match):
              action = match.group(1)
              version = match.group(2)
              version_tag = f'v{version}'

              print(f'  Checking {action}@{version_tag}...', end=' ')

              sha = get_action_sha(action, version_tag)
              if sha:
                print(f'✓ {sha[:7]}...')
                return f'uses: {action}@{sha}  # {version_tag}'
              else:
                print('⊘ keeping version tag')
                return match.group(0)

            content = re.sub(pattern, replace_with_sha, content)

            if content != original_content:
              with open(workflow_file, 'w') as f:
                f.write(content)
              print(f'✅ Updated {workflow_file}')
              total_updated += 1
            else:
              print(f'✓ {workflow_file} already pinned or no changes needed')

          print(f'\n📊 Total files updated: {total_updated}')
          EOF

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/
          git commit -m "chore: pin GitHub Actions to commit SHAs for security"
          git push

      - name: Comment on PR
        if: steps.changes.outputs.changed == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Security:** GitHub Actions have been pinned to commit SHAs.\n\nEach action reference now includes a comment showing the version (e.g., `# v4.1.7`) for readability while using the immutable SHA.'
            })
