name: Scheduled Security Scan

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  security-events: write
  pull-requests: write

env:
  REGISTRY: ghcr.io

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Scan latest released image for new CVEs discovered after release
        image:
          - name: kubernetes-event-logger
            tag: latest

    steps:
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image.name }}:${{ matrix.image.tag }}
          format: sarif
          output: trivy-${{ matrix.image.tag }}-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        if: always()
        with:
          sarif_file: trivy-${{ matrix.image.tag }}-results.sarif
          category: trivy-${{ matrix.image.tag }}

      - name: Create issue if vulnerabilities found
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔴 New vulnerabilities detected in ${{ matrix.image.name }}:${{ matrix.image.tag }}',
              body: 'A scheduled Trivy scan found new vulnerabilities in the `${{ matrix.image.tag }}` image.\n\nCheck the [Security tab](https://github.com/${{ github.repository }}/security/code-scanning) for details.\n\n**Image:** `${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image.name }}:${{ matrix.image.tag }}`\n\n**Next steps:**\n1. Review findings in the Security tab\n2. If critical, rebuild and release a patched version\n3. Update base image or dependencies as needed',
              labels: ['security', 'trivy', 'automated']
            })
