name: Scheduled Security Scan

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kubernetes-event-logger

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve latest release tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Resolve the most recent GitHub Release (the "Latest" one),
          # not the most recent tag, so prereleases/draft tags are ignored.
          tag="$(gh release view \
            --repo "${GITHUB_REPOSITORY}" \
            --json tagName \
            --jq .tagName)"

          if [ -z "$tag" ]; then
            echo "Failed to resolve latest release tag" >&2
            exit 1
          fi

          echo "Latest release tag: $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.release.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,UNKNOWN
          # Without this, SARIF output ignores the severity filter and
          # reports all severities.
          limit-severities-for-sarif: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1  # v4.37.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy-release
