name: Build PR Image

on:
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "chart/**"
      - ".github/actions/install-helm-unittest/**"
      - ".github/workflows/build-pr.yml"

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # 4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version-file: go.mod

      - name: Check Go formatting
        run: |
          unformatted=$(gofmt -l .)

          if [ -n "$unformatted" ]; then
            echo "The following files are not properly formatted:"
            echo "$unformatted"
            echo ""
            echo "Run 'gofmt -w .' to fix formatting"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
        with:
          version: v2.11.4
          args: --timeout=5m

      - name: Run unit tests
        run: go test ./...

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0

      - name: Lint Helm chart
        run: helm lint chart

      - name: Install helm-unittest plugin
        uses: ./.github/actions/install-helm-unittest

      - name: Test Helm chart
        run: helm unittest chart

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Build PR image (local only)
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          outputs: type=docker,dest=/tmp/image.tar
          tags: kubernetes-event-logger:pr-${{ github.event.pull_request.number }}
          labels: |
            org.opencontainers.image.source=${{ github.event.pull_request.html_url }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # master
        with:
          input: /tmp/image.tar
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Comment on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Build & Security Scan Complete**\n\n- Go formatting: OK\n- golangci-lint: OK\n- Unit tests: OK\n- Helm lint: OK\n- Helm unittest: OK\n- Trivy scan: OK\n\nSee [Security tab](https://github.com/${{ github.repository }}/security/code-scanning) for vulnerability details.`
            })
