name: Build PR Image

on:
  pull_request:
    paths:
      - "main.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/build-pr.yml"

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PR image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:pr-${{ github.event.pull_request.number }}
          labels: |
            org.opencontainers.image.source=${{ github.event.pull_request.html_url }}

      - name: Comment on PR
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🐳 **PR Image Ready for Testing**\n\n\`\`\`\ndocker pull ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:pr-${{ github.event.pull_request.number }}\n\`\`\`\n\nOr with Helm:\n\`\`\`bash\nhelm install kubernetes-event-logger oci://${{ env.REGISTRY }}/${{ steps.image.outputs.name }} --set image.tag=pr-${{ github.event.pull_request.number }}\n\`\`\``
            })
