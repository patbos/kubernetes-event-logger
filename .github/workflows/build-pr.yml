name: Build PR Image

on:
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "chart/**"
      - ".github/workflows/build-pr.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6
        with:
          go-version-file: go.mod

      - name: Check Go formatting
        run: |
          unformatted=$(gofmt -l .)

          if [ -n "$unformatted" ]; then
            echo "The following files are not properly formatted:"
            echo "$unformatted"
            echo ""
            echo "Run 'gofmt -w .' to fix formatting"
            exit 1
          fi

      - name: Run unit tests
        run: go test ./...

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4  # v4

      - name: Lint Helm chart
        run: helm lint chart

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Build PR image (local only)
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: kubernetes-event-logger:pr-${{ github.event.pull_request.number }}
          labels: |
            org.opencontainers.image.source=${{ github.event.pull_request.html_url }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@6e7b7d1feac574474aa14e39f0f97658e9be75ef  # v0.25
        with:
          image-ref: docker://kubernetes-event-logger:pr-${{ github.event.pull_request.number }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@662472033e021d55d3e11efd867d592838e2e78a  # v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Comment on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Build & Security Scan Complete**\n\n- Go formatting: OK\n- Unit tests: OK\n- Helm lint: OK\n- Trivy scan: OK\n\nSee [Security tab](https://github.com/${{ github.repository }}/security/code-scanning) for vulnerability details.`
            })
