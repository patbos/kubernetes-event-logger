name: Build PR Image

on:
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "chart/**"
      - ".github/workflows/build-pr.yml"

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6
        with:
          go-version-file: go.mod

      - name: Check Go formatting
        run: |
          unformatted=$(gofmt -l .)

          if [ -n "$unformatted" ]; then
            echo "The following files are not properly formatted:"
            echo "$unformatted"
            echo ""
            echo "Run 'gofmt -w .' to fix formatting"
            exit 1
          fi

      - name: Run unit tests
        run: go test ./...

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4  # v4

      - name: Lint Helm chart
        run: helm lint chart

      - name: Normalize image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PR image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:pr-${{ github.event.pull_request.number }}
          labels: |
            org.opencontainers.image.source=${{ github.event.pull_request.html_url }}

      - name: Comment on PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🐳 **PR Image Ready for Testing**\n\n\`\`\`\ndocker pull ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:pr-${{ github.event.pull_request.number }}\n\`\`\`\n\nOr with Helm:\n\`\`\`bash\nhelm install kubernetes-event-logger oci://${{ env.REGISTRY }}/${{ steps.image.outputs.name }} --set image.tag=pr-${{ github.event.pull_request.number }}\n\`\`\``
            })
