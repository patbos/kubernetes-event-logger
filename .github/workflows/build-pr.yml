name: Build PR Image

on:
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "chart/**"
      - ".github/workflows/build-pr.yml"

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check Go formatting
        run: |
          unformatted=$(gofmt -l .)

          if [ -n "$unformatted" ]; then
            echo "The following files are not properly formatted:"
            echo "$unformatted"
            echo ""
            echo "Run 'gofmt -w .' to fix formatting"
            exit 1
          fi

      - name: Run unit tests
        run: go test ./...

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint chart

  build-amd64:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Normalize image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:pr-${{ github.event.pull_request.number }}-amd64

  build-arm64:
    needs: test
    runs-on: ubuntu-latest-arm64

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Normalize image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:pr-${{ github.event.pull_request.number }}-arm64

  create-manifest:
    needs: [test, build-amd64, build-arm64]
    runs-on: ubuntu-latest

    steps:
      - name: Normalize image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        id: manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:pr-${{ github.event.pull_request.number }} \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:pr-${{ github.event.pull_request.number }}-amd64 \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:pr-${{ github.event.pull_request.number }}-arm64

      - name: Comment on PR
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🐳 **PR Image Ready for Testing**\n\n\`\`\`\ndocker pull ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:pr-${{ github.event.pull_request.number }}\n\`\`\`\n\nOr with Helm:\n\`\`\`bash\nhelm install kubernetes-event-logger oci://${{ env.REGISTRY }}/${{ steps.image.outputs.name }} --set image.tag=pr-${{ github.event.pull_request.number }}\n\`\`\``
            })
