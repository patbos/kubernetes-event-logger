name: Publish Helm Chart

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve chart version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(grep '^version:' chart/Chart.yaml | awk '{print $2}')" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm chart
        run: |
          helm package chart \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "${GITHUB_REF_NAME}"

      - name: Push Helm chart to GHCR
        run: |
          REPO="${GITHUB_REPOSITORY,,}"
          helm push kubernetes-event-logger-${{ steps.version.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/${REPO%/*}
