name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: go.mod

      - name: Check Go formatting
        run: |
          unformatted=$(gofmt -l .)

          if [ -n "$unformatted" ]; then
            echo "The following files are not properly formatted:"
            echo "$unformatted"
            echo ""
            echo "Run 'gofmt -w .' to fix formatting"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
        with:
          version: v2.11.4
          args: --timeout=5m

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: Dockerfile

      - name: Run unit tests
        run: go test ./...

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0

      - name: Lint Helm chart
        run: helm lint chart

      - name: Install helm-unittest plugin (signature verified)
        env:
          HELM_UNITTEST_VERSION: 1.1.0
          # Public PGP fingerprint of the upstream helm-unittest signing key.
          # Pinned here so a swap of .github/keys/helm-unittest-public-key.asc fails CI.
          HELM_UNITTEST_KEY_FPR: 853008CD0B0A5A2DA04FF8A5616AD47F65B54AC7
        run: |
          set -euo pipefail

          workdir="$(mktemp -d)"
          tgz="${workdir}/unittest-${HELM_UNITTEST_VERSION}.tgz"
          base="https://github.com/helm-unittest/helm-unittest/releases/download/v${HELM_UNITTEST_VERSION}"

          # Tarball, detached signature, helm provenance file, and the
          # provenance's detached signature.
          curl -fsSL --retry 3 -o "$tgz"        "${base}/unittest-${HELM_UNITTEST_VERSION}.tgz"
          curl -fsSL --retry 3 -o "$tgz.asc"    "${base}/unittest-${HELM_UNITTEST_VERSION}.tgz.asc"
          curl -fsSL --retry 3 -o "$tgz.prov"   "${base}/unittest-${HELM_UNITTEST_VERSION}.tgz.prov"
          curl -fsSL --retry 3 -o "$tgz.prov.asc" "${base}/unittest-${HELM_UNITTEST_VERSION}.tgz.prov.asc"

          # Import the upstream signing key into an isolated, ephemeral
          # GNUPGHOME and assert the fingerprint matches the pinned value
          # before trusting any signature.
          export GNUPGHOME="${workdir}/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          gpg --batch --import .github/keys/helm-unittest-public-key.asc

          imported_fpr="$(gpg --batch --with-colons --fingerprint --import-options show-only --import \
            .github/keys/helm-unittest-public-key.asc \
            | awk -F: '/^fpr:/ {print $10; exit}')"
          if [ "$imported_fpr" != "$HELM_UNITTEST_KEY_FPR" ]; then
            echo "Imported helm-unittest key fingerprint $imported_fpr does not match expected $HELM_UNITTEST_KEY_FPR" >&2
            exit 1
          fi

          # Direct integrity check on the tarball (independent of helm).
          gpg --batch --verify "$tgz.asc"      "$tgz"
          # Provenance file is what helm itself will re-verify below.
          gpg --batch --verify "$tgz.prov.asc" "$tgz.prov"

          # Helm 4 verifies plugin tarballs against a legacy GnuPG keyring
          # using the .prov file. Export our verified key into that format
          # and pass it explicitly via --keyring.
          pubring="${workdir}/pubring.gpg"
          gpg --batch --export "$HELM_UNITTEST_KEY_FPR" > "$pubring"

          helm plugin install "$tgz" --keyring "$pubring"

      - name: Test Helm chart
        run: helm unittest chart
