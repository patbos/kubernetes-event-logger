version: 2
updates:
  # Go module dependency updates
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: daily
    # Open PR for each update (don't batch)
    open-pull-requests-limit: 10
    reviewers:
      - patbos
    commit-message:
      prefix: "deps"
      include: "scope"

  # Docker base image updates
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    # Check base image for security updates
    open-pull-requests-limit: 5

  # GitHub Actions version updates
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

